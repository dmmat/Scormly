name: Bug report
description: Report a problem with Scormly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Scormly runs entirely in your
        browser, so details about your environment help a lot.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I... I expected... but instead...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See the error
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Firefox
        - Safari
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Scormly version / commit
      placeholder: e.g. 0.1.0 or commit hash
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, console errors, or anything else.
