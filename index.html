<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Scormly — Free, local-first SCORM course builder</title>
    <meta
      name="description"
      content="Scormly is a free, open-source, local-first course builder with one-click SCORM 1.2 / 2004 export. Build interactive courses in your browser — no backend, no sign-up, your data never leaves your computer."
    />
    <meta name="keywords" content="SCORM, course builder, e-learning, open source, local-first, SCORM export, LMS, Moodle" />
    <meta name="theme-color" content="#ec4899" />
    <link rel="canonical" href="https://scormly.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Scormly — Free, local-first SCORM course builder" />
    <meta
      property="og:description"
      content="Build interactive courses and export to SCORM right in your browser. Open source, free, and 100% local — your data never leaves your computer."
    />
    <meta property="og:site_name" content="Scormly" />
    <meta property="og:url" content="https://scormly.app/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="uk_UA" />
    <meta property="og:image" content="https://scormly.app/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Scormly — build interactive courses and export to SCORM" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scormly — Free, local-first SCORM course builder" />
    <meta
      name="twitter:description"
      content="Build interactive courses and export to SCORM right in your browser. Open source, free, and 100% local."
    />
    <meta name="twitter:image" content="https://scormly.app/og-image.png" />
    <meta name="twitter:image:alt" content="Scormly — build interactive courses and export to SCORM" />

    <!-- Misc -->
    <meta name="author" content="Dmytro Matsiuk" />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="Scormly" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Installable web app (Chrome "Install app") -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ec4899" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Scormly" />

    <!-- Structured data: helps search engines and AI assistants understand the project. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Scormly",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web browser (Chromium-based for disk save)",
        "url": "https://scormly.app/",
        "description": "Free, open-source, local-first course builder that runs in the browser and exports SCORM 1.2 / 2004 and cmi5 (xAPI) packages for any LMS. No backend, no account — your data stays on your device.",
        "license": "https://opensource.org/licenses/MIT",
        "isAccessibleForFree": true,
        "inLanguage": ["en", "uk"],
        "author": { "@type": "Person", "name": "Dmytro Matsiuk" },
        "codeRepository": "https://github.com/dmmat/Scormly",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "featureList": [
          "Block-based course editor",
          "SCORM 1.2 / 2004 export",
          "cmi5 (xAPI) export",
          "Quizzes, flashcards, branching dialogue scenarios",
          "Local-first: no backend, data stays on device"
        ]
      }
    </script>

    <!-- Organization + WebSite: helps Google associate the brand name and logo
         with the result, and links the site to its publisher. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://scormly.app/#organization",
            "name": "Scormly",
            "url": "https://scormly.app/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://scormly.app/favicon.svg",
              "caption": "Scormly"
            },
            "image": "https://scormly.app/og-image.png",
            "founder": { "@type": "Person", "name": "Dmytro Matsiuk" },
            "sameAs": ["https://github.com/dmmat/Scormly"]
          },
          {
            "@type": "WebSite",
            "@id": "https://scormly.app/#website",
            "name": "Scormly",
            "url": "https://scormly.app/",
            "description": "Free, open-source, local-first SCORM course builder.",
            "inLanguage": ["en", "uk"],
            "publisher": { "@id": "https://scormly.app/#organization" }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
